let _stepIdx = {};

function revealStep(groupId, btnId) {
  if (_stepIdx[groupId] === undefined) _stepIdx[groupId] = 0;
  const steps = document.querySelectorAll('#' + groupId + ' .step');
  _stepIdx[groupId] = Math.min(_stepIdx[groupId] + 1, steps.length - 1);
  steps[_stepIdx[groupId]].classList.remove('hidden');
  if (_stepIdx[groupId] === steps.length - 1) {
    const btn = document.getElementById(btnId);
    if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
  }
}

function switchSlideTab(groupClass, panelPrefix, name, clickedBtn) {
  document.querySelectorAll('.' + groupClass + '-panel').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.' + groupClass + '-tab').forEach(t => t.classList.remove('active'));
  const panel = document.getElementById(panelPrefix + name);
  if (panel) panel.classList.remove('hidden');
  if (clickedBtn) clickedBtn.classList.add('active');
}

function toggleExpand(detailId, btn) {
  const el = document.getElementById(detailId);
  if (!el) return;
  if (el.style.display === 'none' || el.style.display === '') {
    el.style.display = 'block'; btn.textContent = '▲ 收起';

    el.style.display = 'none'; btn.textContent = '▶ 查看详细';

let current = 0;

function buildDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.style.cssText = 'width:10px;height:10px;border-radius:50%;cursor:pointer;transition:all 0.25s;';
    d.style.background = i === current ? '#667eea' : '#ccc';
    d.style.transform = i === current ? 'scale(1.4)' : 'scale(1)';
    d.onclick = () => showSlide(i);
    el.appendChild(d);
  });
}

function showSlide(idx) {
  current = idx;
  _stepIdx = {};
  const c = document.getElementById(CONTAINER_ID);
  c.innerHTML = slides[idx];
  const pn = c.querySelector('#pn');
  if (pn) pn.textContent = (idx + 1) + ' / ' + slides.length;
  document.getElementById('btn-prev').style.opacity = idx === 0 ? '0.3' : '1';
  document.getElementById('btn-next').style.opacity = idx === slides.length - 1 ? '0.3' : '1';
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === slides.length - 1;
  buildDots();
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([c]).catch(console.warn);
  const mEls = c.querySelectorAll('.mermaid');
  if (mEls.length) { mEls.forEach(e => e.removeAttribute('data-processed')); mermaid.init(undefined, mEls); }
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < slides.length) showSlide(n);
}

window.addEventListener('load', () => {
  if (window.MathJax && window.MathJax.startup && window.MathJax.startup.promise) {
    MathJax.startup.promise.then(() => showSlide(0));
  } else {
    showSlide(0);
  }
});
</script>
